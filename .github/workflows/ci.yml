name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install & test
        run: uv sync --all-groups && uv run pytest

      - name: Build container
        run: docker build -t resumi:ci .

      - name: Health check
        run: |
          docker run -d --name resumi -p 8000:8000 resumi:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && exit 0
            sleep 2
          done
          docker logs resumi
          exit 1
